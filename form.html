<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Review Form</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <header>
    <h1>Product Review</h1>
    <p>Share your experience with our products.</p>
  </header>

  <main>
    <form method="get" action="review.html">
      <div class="field">
        <label for="productName">Product Name</label>
        <select id="productName" name="productName" required>
          <option value="" disabled selected>Select a Product ...</option>
        </select>
      </div>

      <fieldset class="field">
        <legend>Overall Rating</legend>
        <div class="rating-group">
          <label for="rating1">
            <input type="radio" id="rating1" name="overallRating" value="1" required>
            <span aria-hidden="true">&star;</span>
            <span class="visually-hidden">1 star</span>
          </label>
          <label for="rating2">
            <input type="radio" id="rating2" name="overallRating" value="2" required>
            <span aria-hidden="true">&star;&star;</span>
            <span class="visually-hidden">2 stars</span>
          </label>
          <label for="rating3">
            <input type="radio" id="rating3" name="overallRating" value="3" required>
            <span aria-hidden="true">&star;&star;&star;</span>
            <span class="visually-hidden">3 stars</span>
          </label>
          <label for="rating4">
            <input type="radio" id="rating4" name="overallRating" value="4" required>
            <span aria-hidden="true">&star;&star;&star;&star;</span>
            <span class="visually-hidden">4 stars</span>
          </label>
          <label for="rating5">
            <input type="radio" id="rating5" name="overallRating" value="5" required>
            <span aria-hidden="true">&star;&star;&star;&star;&star;</span>
            <span class="visually-hidden">5 stars</span>
          </label>
        </div>
      </fieldset>

      <div class="field">
        <label for="installDate">Date of Installation</label>
        <input type="date" id="installDate" name="installDate" required>
      </div>

      <fieldset class="field">
        <legend>Useful Features</legend>
        <div class="checkbox-group">
          <label for="featureDurability">
            <input type="checkbox" id="featureDurability" name="featureDurability" value="durability">
            Durability
          </label>
          <label for="featureEase">
            <input type="checkbox" id="featureEase" name="featureEase" value="ease-of-use">
            Ease of use
          </label>
          <label for="featurePerformance">
            <input type="checkbox" id="featurePerformance" name="featurePerformance" value="performance">
            Performance
          </label>
          <label for="featureDesign">
            <input type="checkbox" id="featureDesign" name="featureDesign" value="design">
            Design
          </label>
        </div>
      </fieldset>

      <div class="field">
        <label for="writtenReview">Written Review <span class="optional">(optional)</span></label>
        <textarea id="writtenReview" name="writtenReview" rows="5" cols="50" placeholder="Tell us more about your experience..."></textarea>
      </div>

      <div class="field">
        <label for="userName">User Name <span class="optional">(optional)</span></label>
        <input type="text" id="userName" name="userName" autocomplete="name">
      </div>

      <div class="field actions">
        <input type="submit" value="Submit Review">
      </div>
    </form>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> Product Reviews</p>
  </footer>

  <script src="scripts/form.js"></script>
</body>
</html>

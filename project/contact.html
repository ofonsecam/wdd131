<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Aura Planner for support, product questions, or feedback. Use our form to reach the team and get help with your task management experience.">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; img-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; upgrade-insecure-requests">
    <title>Contact - Aura Planner</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header>
        <div class="logo">Aura Planner</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="app.html">My Planner</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h1>Contact Us</h1>
            <div class="profile-container">
                <img
                    src="images/oscar.png"
                    alt="Portrait of Oscar Fonseca, Aura Planner developer, wearing a light blue sweater against a wooden background."
                    loading="lazy"
                    width="150"
                    height="150"
                    class="profile-img"
                >
            </div>
            <form action="#" method="get">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="message">Message:</label>
                <textarea id="message" name="message"></textarea>
                
                <button type="submit">Send Message</button>
            </form>
        </section>
        <section class="references">
            <h2>References</h2>
            <ul>
                <li>Duckett, J. (2014). Web Design with HTML, CSS, JavaScript and jQuery. Wiley.</li>
                <li>W3C. (2024). HTML5 Semantic Elements.</li>
            </ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Aura Planner | Oscar Fonseca</p>
    </footer>
</body>
</html>

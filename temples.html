<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Temple Album – Gallery of LDS temples with photos organized by category: Home, Old, New, Large, and Small.">
  <meta name="author" content="Oscar Fonseca">
  <title>Temple Album</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="styles/temples.css">
  <link rel="stylesheet" href="styles/temples-large.css">
  <script src="scripts/temples.js" defer></script>
</head>
<body>
  <header>
    <h1>Temple Album</h1>
    <button type="button" id="menu" aria-label="Open Navigation" aria-expanded="false">&#9776;</button>
    <nav id="navigation">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Old</a></li>
        <li><a href="#">New</a></li>
        <li><a href="#">Large</a></li>
        <li><a href="#">Small</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h2>Home</h2>
    <section class="gallery" aria-label="Temple photo gallery">
      <figure>
        <img src="https://placehold.co/400x250" alt="Temple exterior view with spire and gardens" width="400" height="250" loading="lazy">
        <figcaption>Salt Lake Temple</figcaption>
      </figure>
      <figure>
        <img src="https://placehold.co/400x250" alt="Temple building and reflection pool" width="400" height="250" loading="lazy">
        <figcaption>Washington D.C. Temple</figcaption>
      </figure>
      <figure>
        <img src="https://placehold.co/400x250" alt="Temple facade with columns" width="400" height="250" loading="lazy">
        <figcaption>San Diego California Temple</figcaption>
      </figure>
      <figure>
        <img src="https://placehold.co/400x250" alt="Temple at sunset" width="400" height="250" loading="lazy">
        <figcaption>Bogotá Colombia Temple</figcaption>
      </figure>
      <figure>
        <img src="https://placehold.co/400x250" alt="Temple with mountain backdrop" width="400" height="250" loading="lazy">
        <figcaption>Provo Utah Temple</figcaption>
      </figure>
      <figure>
        <img src="https://placehold.co/400x250" alt="Temple entrance and landscaping" width="400" height="250" loading="lazy">
        <figcaption>Mérida Mexico Temple</figcaption>
      </figure>
      <figure>
        <img src="https://placehold.co/400x250" alt="Temple spire and sky" width="400" height="250" loading="lazy">
        <figcaption>Rexburg Idaho Temple</figcaption>
      </figure>
      <figure>
        <img src="https://placehold.co/400x250" alt="Temple grounds and visitor center" width="400" height="250" loading="lazy">
        <figcaption>Gilbert Arizona Temple</figcaption>
      </figure>
      <figure>
        <img src="https://placehold.co/400x250" alt="Temple exterior with trees" width="400" height="250" loading="lazy">
        <figcaption>Lima Peru Temple</figcaption>
      </figure>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="currentyear"></span> | Oscar | Colombia</p>
    <p>Last Modification: <span id="lastModified"></span></p>
  </footer>
</body>
</html>

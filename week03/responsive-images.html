<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Images</title>
    <link rel="stylesheet" href="styles/responsive-images.css">
</head>
<body>
    <main>
        <div class="hero">
            <picture>
                <source srcset="images/temple_high.jpg" media="(min-width: 1000px)">
                
                <source srcset="images/temple_high.jpg" media="(min-width: 500px)">
                
                <img src="images/temple_low.webp" alt="Temple Aba Nigeria" width="1500" height="750">
            </picture>
        </div>
    </main>  
</body>
</html>
